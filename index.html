<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Pilar ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

body{
    margin:0;
    background:#e9dfd2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Georgia,serif;
}

#book{
    width:900px;
    height:600px;
}

.page{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:30px;
    box-sizing:border-box;
}

.page img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.cover{
    background:#fff7f9;
    text-align:center;
}

.cover h1{
    color:#c44f88;
    font-size:3rem;
}

.cover p{
    color:#666;
}

.final{
    text-align:center;
}

.final h1{
    color:#d43f7f;
}

@media(max-width:900px){

    #book{
        width:100%;
        height:100vh;
    }

}
</style>
</head>

<body>

<div id="book">

    <div class="page cover">
        <h1>Para Pilar ❤️</h1>
        <p>Un pequeño regalo para una gran amiga</p>
    </div>

    <div class="page">
        <img src="foto1.jpg">
    </div>

    <div class="page">
        <h2>🎂 Feliz Cumpleaños</h2>

        <p>
        Amiga de mi corazón ❤️
        <br><br>
        Hoy celebramos a una persona maravillosa.
        </p>
    </div>

    <div class="page">
        <img src="foto2.jpg">
    </div>

    <div class="page">
        <h2>✨ Gracias por tu amistad</h2>

        <p>
        Alegre<br>
        Bondadosa<br>
        Apasionada<br>
        Espiritual<br>
        Única ❤️
        </p>
    </div>

    <div class="page">
        <img src="carta.jpg">
    </div>

    <div class="page final">

        <h1>¡Te adoro muchísimo! ❤️</h1>

        <p>
        Con mucho amor
        <br><br>
        Tania
        <br><br>
        Junio 11 de 2026
        </p>

    </div>

</div>

<script>

const pageFlip = new St.PageFlip(
    document.getElementById("book"),
    {
        width:450,
        height:600,

        size:"stretch",

        minWidth:315,
        maxWidth:1000,

        minHeight:420,
        maxHeight:1350,

        showCover:true,

        mobileScrollSupport:true
    }
);

pageFlip.loadFromHTML(
    document.querySelectorAll(".page")
);

</script>

</body>
</html>
